name: ci

on:
  push:
    branches:
      - '**'
    paths:
      - '!**/**'
      - '.github/ci.yaml'
      - '*.sh'
      - 'Makefile'
  schedule:
    - cron: '0 3 1 * *'  # First day of the month at 3 a.m.

jobs:
  part2:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v2

      - name: docker-compose up
        run: |
          set -eo pipefail
          docker-compose version
          docker-compose up -d
          docker ps

      - name: container up
        run: |
          set -eo pipefail
          docker-compose exec -T jhalfs bash -c "cd /vagrant && bash /vagrant/up.sh"

      - name: fetch jhalfs commit info
        run: |
          set -eo pipefail
          docker-compose exec -T jhalfs bash -c "su - vagrant -c 'cd /home/vagrant/jhalfs && git show --oneline --no-abbrev --shortstat'"

      - name: fetch lfs commit info
        run: |
          set -eo pipefail
          docker-compose exec -T jhalfs bash -c "su - vagrant -c 'source /vagrant/jhalfs/jhalfs.sh && cd \$LFS/jhalfs/book-source && git show --oneline --no-abbrev --shortstat'"

      # The jhalfs directory is assumed to be unchaged from this point, hence caching it once
      # In other words, the $LFS mounted in the guest (container) is assumed invisible (empty dir) to the host
      - name: write cache jhalfs
        uses: actions/cache@v3
        with:
          path: |
            jhalfs
          key: jhalfs-${{ github.sha }}

      - name: make ck_UID
        run: |
          set -eo pipefail
          docker-compose exec -T jhalfs bash -c "su - vagrant -c 'source /vagrant/jhalfs/jhalfs.sh && cd \$LFS/jhalfs && make $TARGET'"
        env:
          TARGET: ck_UID

      - name: make ck_terminal
        run: |
          set -eo pipefail
          # Exclude ck_terminal target, which fails with:
          # stty: 'standard input': Inappropriate ioctl for device
          # Terminal too small:  columns x  lines
          # Minimum: 80 columns x 24 lines
          exit 0
          docker-compose exec -T jhalfs bash -c "su - vagrant -c 'source /vagrant/jhalfs/jhalfs.sh && cd \$LFS/jhalfs && make $TARGET'"
        env:
          TARGET: ck_terminal

      - name: make mk_SETUP
        run: |
          set -eo pipefail
          docker-compose exec -T jhalfs bash -c "su - vagrant -c 'source /vagrant/jhalfs/jhalfs.sh && cd \$LFS/jhalfs && make $TARGET'"
        env:
          TARGET: mk_SETUP

      - name: save jhalfs:part2 image
        run: |
          set -eo pipefail
          docker commit -m "II. Preparing for the Build" jhalfs jhalfs:part2
          docker save jhalfs:part2 > jhalfs.tar
          docker stop jhalfs
          docker rm jhalfs
          docker images
          docker ps

      # https://github.com/actions/cache/issues/2 - no way to update the cache - use suffix
      - name: write cache jhalfs.tar
        uses: actions/cache@v3
        with:
          path: |
            jhalfs.tar
          key: jhalfs.tar.part2-${{ github.sha }}

      - name: write cache build_dir.img
        uses: actions/cache@v3
        with:
          path: |
            build_dir.img
          key: build_dir.img.part2-${{ github.sha }}

  part3lfs:
    needs: part2
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v2

      - name: read cache jhalfs
        uses: actions/cache@v3
        with:
          path: |
            jhalfs
          key: jhalfs-${{ github.sha }}

      - name: read cache jhalfs.tar
        uses: actions/cache@v3
        with:
          path: |
            jhalfs.tar
          key: jhalfs.tar.part2-${{ github.sha }}

      - name: read cache build_dir.img
        uses: actions/cache@v3
        with:
          path: |
            build_dir.img
          key: build_dir.img.part2-${{ github.sha }}

      - name: load jhalfs:part2 image
        run: |
          set -eo pipefail
          docker load < jhalfs.tar
          JHALFS_IMAGE=jhalfs:part2 docker-compose up -d
          docker images
          docker ps

      - name: attach and mount loopback
        run: |
          set -eo pipefail
          docker-compose exec -T jhalfs bash -c "losetup \$(cat /vagrant/jhalfs/build_dir.dev) /vagrant/build_dir.img && mount -a"

      - name: make mk_LUSER
        run: |
          set -eo pipefail
          docker-compose exec -T jhalfs bash -c "su - vagrant -c 'source /vagrant/jhalfs/jhalfs.sh && cd \$LFS/jhalfs && make $TARGET'"
        env:
          TARGET: mk_LUSER

      - name: save jhalfs:part3lfs image
        run: |
          set -eo pipefail
          docker commit -m "III. Building the LFS Cross Toolchain and Temporary Tools" jhalfs jhalfs:part3lfs
          docker save jhalfs:part3lfs > jhalfs.tar
          docker stop jhalfs
          docker rm jhalfs
          docker images
          docker ps

      - name: write cache jhalfs.tar
        uses: actions/cache@v3
        with:
          path: |
            jhalfs.tar
          key: jhalfs.tar.part3lfs-${{ github.sha }}

      - name: write cache build_dir.img
        uses: actions/cache@v3
        with:
          path: |
            build_dir.img
          key: build_dir.img.part3lfs-${{ github.sha }}

  part3sudo:
    needs: part3lfs
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v2

      - name: read cache jhalfs
        uses: actions/cache@v3
        with:
          path: |
            jhalfs
          key: jhalfs-${{ github.sha }}

      - name: read cache jhalfs.tar
        uses: actions/cache@v3
        with:
          path: |
            jhalfs.tar
          key: jhalfs.tar.part3lfs-${{ github.sha }}

      - name: read cache build_dir.img
        uses: actions/cache@v3
        with:
          path: |
            build_dir.img
          key: build_dir.img.part3lfs-${{ github.sha }}

      - name: load jhalfs:part3lfs image
        run: |
          set -eo pipefail
          docker load < jhalfs.tar
          JHALFS_IMAGE=jhalfs:part3lfs docker-compose up -d
          docker images
          docker ps

      - name: attach and mount loopback
        run: |
          set -eo pipefail
          docker-compose exec -T jhalfs bash -c "losetup \$(cat /vagrant/jhalfs/build_dir.dev) /vagrant/build_dir.img && mount -a"

      - name: make mk_SUDO
        run: |
          set -eo pipefail
          docker-compose exec -T jhalfs bash -c "su - vagrant -c 'source /vagrant/jhalfs/jhalfs.sh && cd \$LFS/jhalfs && make $TARGET'"
        env:
          TARGET: mk_SUDO

      - name: make mk_CHROOT
        run: |
          set -eo pipefail
          docker-compose exec -T jhalfs bash -c "su - vagrant -c 'source /vagrant/jhalfs/jhalfs.sh && cd \$LFS/jhalfs && make $TARGET'"
        env:
          TARGET: mk_CHROOT

      - name: save jhalfs:part3sudo image
        run: |
          set -eo pipefail
          docker commit -m "III. Building the LFS Cross Toolchain and Temporary Tools" jhalfs jhalfs:part3sudo
          docker save jhalfs:part3sudo > jhalfs.tar
          docker stop jhalfs
          docker rm jhalfs
          docker images
          docker ps

      - name: write cache jhalfs.tar
        uses: actions/cache@v3
        with:
          path: |
            jhalfs.tar
          key: jhalfs.tar.part3sudo-${{ github.sha }}

      - name: write cache build_dir.img
        uses: actions/cache@v3
        with:
          path: |
            build_dir.img
          key: build_dir.img.part3sudo-${{ github.sha }}

  part4:
    needs: part3sudo
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v2

      - name: read cache jhalfs
        uses: actions/cache@v3
        with:
          path: |
            jhalfs
          key: jhalfs-${{ github.sha }}

      - name: read cache jhalfs.tar
        uses: actions/cache@v3
        with:
          path: |
            jhalfs.tar
          key: jhalfs.tar.part3sudo-${{ github.sha }}

      - name: read cache build_dir.img
        uses: actions/cache@v3
        with:
          path: |
            build_dir.img
          key: build_dir.img.part3sudo-${{ github.sha }}

      - name: load jhalfs:part3sudo image
        run: |
          set -eo pipefail
          docker load < "jhalfs:part3sudo.tar"
          JHALFS_IMAGE=jhalfs:part3sudo docker-compose up -d
          docker images
          docker ps

      - name: attach and mount loopback
        run: |
          set -eo pipefail
          docker-compose exec -T jhalfs bash -c "losetup \$(cat /vagrant/jhalfs/build_dir.dev) /vagrant/build_dir.img && mount -a"

      - name: make mk_BOOT
        run: |
          set -eo pipefail
          docker-compose exec -T jhalfs bash -c "su - vagrant -c 'source /vagrant/jhalfs/jhalfs.sh && cd \$LFS/jhalfs && make $TARGET'"
        env:
          TARGET: mk_BOOT

      - name: make create-sbu_du-report
        run: |
          set -eo pipefail
          docker-compose exec -T jhalfs bash -c "su - vagrant -c 'source /vagrant/jhalfs/jhalfs.sh && cd \$LFS/jhalfs && make $TARGET'"
        env:
          TARGET: create-sbu_du-report

      - name: save jhalfs:part4 image
        run: |
          set -eo pipefail
          docker commit -m "IV. Building the LFS System" jhalfs jhalfs:part4
          docker save jhalfs:part4 > jhalfs.tar
          #docker stop jhalfs  # This is the last part of the book run, don't stop the container
          #docker rm jhalfs
          docker images
          docker ps

      - name: write cache jhalfs.tar
        uses: actions/cache@v3
        with:
          path: |
            jhalfs.tar
          key: jhalfs.tar.part4-${{ github.sha }}

      - name: write cache build_dir.img
        uses: actions/cache@v3
        with:
          path: |
            build_dir.img
          key: build_dir.img.part4-${{ github.sha }}

      - name: print SBUs report
        run: |
          set -eo pipefail
          docker-compose exec jhalfs bash -c "su - vagrant -c 'source /vagrant/jhalfs/jhalfs.sh && cat \$LFS/jhalfs/*SBU_DU*.report'"

      - name: make mk_BLFS_TOOL
        run: |
          set -eo pipefail
          docker-compose exec -T jhalfs bash -c "su - vagrant -c 'source /vagrant/jhalfs/jhalfs.sh && cd \$LFS/jhalfs && make $TARGET'"
        env:
          TARGET: mk_BLFS_TOOL

      - name: make mk_CUSTOM_TOOLS
        run: |
          set -eo pipefail
          docker-compose exec -T jhalfs bash -c "su - vagrant -c 'source /vagrant/jhalfs/jhalfs.sh && cd \$LFS/jhalfs && make $TARGET'"
        env:
          TARGET: mk_CUSTOM_TOOLS
