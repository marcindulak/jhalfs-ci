      - name: save jhalfs:part3 image
        run: |
          set -eo pipefail
          docker commit -m "III. Building the LFS Cross Toolchain and Temporary Tools" jhalfs jhalfs:part3
          docker save jhalfs:part3 > jhalfs.tar
