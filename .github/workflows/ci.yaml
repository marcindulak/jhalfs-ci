name: ci

on:
  push:
    branches:
      - '**'
    paths:
      - '!**/**'
      - '.github/ci.yaml'
      - '*.sh'
      - 'Makefile'
      - 'Vagrantfile'

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v2

      - name: vagrant install
        run: |
          set -eo pipefail
          wget -O- https://apt.releases.hashicorp.com/gpg | gpg --dearmor | sudo tee /usr/share/keyrings/hashicorp-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] https://apt.releases.hashicorp.com $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/hashicorp.list
          sudo apt update
          sudo apt install -y vagrant
          vagrant version

      - name: vagrant up
        run: |
          set -eo pipefail
          vagrant up

      - name: container up
        run: |
          set -eo pipefail
          vagrant docker-exec -t -- bash -c "cd /vagrant && bash /vagrant/up.sh"

      - name: fetch jhalfs commit info
        run: |
          set -eo pipefail
          vagrant docker-exec -t -- bash -c "su - vagrant -c 'cd /home/vagrant/jhalfs && git show --oneline --no-abbrev --shortstat'"

      - name: fetch lfs commit info
        run: |
          set -eo pipefail
          vagrant docker-exec -t -- bash -c "su - vagrant -c 'source /vagrant/jhalfs/jhalfs.sh && cd \$LFS/jhalfs/book-source && git show --oneline --no-abbrev --shortstat'"

      - name: make
        run: |
          set -eo pipefail
          vagrant docker-exec -t -- bash -c "su - vagrant -c 'source /vagrant/jhalfs/jhalfs.sh && cd \$LFS/jhalfs && make \$TARGET'"
        env:
          # Exclude ck_terminal target, which fails with:
          # stty: 'standard input': Inappropriate ioctl for device
          # Terminal too small:  columns x  lines
          # Minimum: 80 columns x 24 lines
          TARGET: ck_UID mk_SETUP mk_LUSER mk_SUDO mk_CHROOT mk_BOOT create-sbu_du-report mk_BLFS_TOOL mk_CUSTOM_TOOLS
