      - name: write cache build_dir.img
        uses: actions/cache@v3
        with:
          path: |
            build_dir.img
          key: ${{ runner.os }}-${{ github.sha }}-build_dir.img.part3

  part4:
    needs: part3
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v2

      - name: read cache jhalfs
        uses: actions/cache@v3
        with:
          path: |
            jhalfs
          key: ${{ runner.os }}-${{ github.sha }}-jhalfs

      - name: read cache jhalfs.tar
        uses: actions/cache@v3
        with:
          path: |
            jhalfs.tar
          key: ${{ runner.os }}-${{ github.sha }}-jhalfs.tar.part3

      - name: read cache build_dir.img
        uses: actions/cache@v3
        with:
          path: |
            build_dir.img
          key: ${{ runner.os }}-${{ github.sha }}-build_dir.img.part3

      - name: load jhalfs:part3 image
        run: |
          set -eo pipefail
          docker load < "jhalfs:part3.tar"
          JHALFS_IMAGE=jhalfs:part3 docker-compose up -d
          docker images
          docker ps

      - name: attach and mount loopback
        shell: 'script -q -e -c "bash {0}"'
        run: |
          set -eo pipefail
          docker-compose exec jhalfs bash -c "losetup \$(cat /vagrant/jhalfs/build_dir.dev) /vagrant/build_dir.img && mount -a"

      - name: make mk_BOOT
        shell: 'script -q -e -c "bash {0}"'
        run: |
          set -eo pipefail
          docker-compose exec jhalfs bash -c "su - vagrant -c 'source /vagrant/jhalfs/jhalfs.sh && cd \$LFS/jhalfs && make $TARGET'"
        env:
          TARGET: mk_BOOT

      - name: make create-sbu_du-report
        shell: 'script -q -e -c "bash {0}"'
        run: |
          set -eo pipefail
          docker-compose exec jhalfs bash -c "su - vagrant -c 'source /vagrant/jhalfs/jhalfs.sh && cd \$LFS/jhalfs && make $TARGET'"
        env:
          TARGET: create-sbu_du-report

      - name: save jhalfs:part4 image
        run: |
          set -eo pipefail
          docker commit -m "IV. Building the LFS System" jhalfs jhalfs:part4
          docker save jhalfs:part4 > jhalfs.tar
          #docker stop jhalfs  # This is the last part of the book run, don't stop the container
          #docker rm jhalfs
          docker images
          docker ps

      - name: write cache jhalfs.tar
        uses: actions/cache@v3
        with:
          path: |
            jhalfs.tar
          key: ${{ runner.os }}-${{ github.sha }}-jhalfs.tar.part4

      - name: write cache build_dir.img
        uses: actions/cache@v3
        with:
          path: |
            build_dir.img
          key: ${{ runner.os }}-${{ github.sha }}-build_dir.img.part4

      - name: print SBUs report
        shell: 'script -q -e -c "bash {0}"'
        run: |
          set -eo pipefail
          docker-compose exec jhalfs bash -c "su - vagrant -c 'source /vagrant/jhalfs/jhalfs.sh && cat \$LFS/jhalfs/*SBU_DU*.report'"

      - name: make mk_BLFS_TOOL
        shell: 'script -q -e -c "bash {0}"'
        run: |
          set -eo pipefail
          docker-compose exec jhalfs bash -c "su - vagrant -c 'source /vagrant/jhalfs/jhalfs.sh && cd \$LFS/jhalfs && make $TARGET'"
        env:
          TARGET: mk_BLFS_TOOL

      - name: make mk_CUSTOM_TOOLS
        shell: 'script -q -e -c "bash {0}"'
        run: |
          set -eo pipefail
          docker-compose exec jhalfs bash -c "su - vagrant -c 'source /vagrant/jhalfs/jhalfs.sh && cd \$LFS/jhalfs && make $TARGET'"
        env:
          TARGET: mk_CUSTOM_TOOLS
